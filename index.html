<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title><%= htmlWebpackPlugin.options.title %></title>
  <meta name=keywords content="网址导航, 海风导航, 视频, 开发, 音乐, 创意灵感">
  <meta name="description" content="简洁无广告的网址导航，分享优秀站点">
  <link rel="shortcut icon" href="/static/favicon.ico" />
  <link rel="bookmark" href="/static/favicon.ico" type="image/x-icon"　/>
</head>

<body>
  <div class="main">
    <div class="main-content">
      <div class="header">
        <span class="weather hide">天气预报</span>
      </div>
      <div class="search">
        <div class="search-engine">
          <span class="engine-logo baidu">Baidu</span>
          <span class="engine-logo google">Google</span>
          <span class="engine-logo bing">Bing</span>
        </div>
        <div class="search-input">
          <input type="text" class="search-input-el" id="searchInputEl" placeholder="百度搜索" spellcheck="false"
            autocomplete="off">
          <button style="display: none;" id="searchSubmitEl">Submit</button>
        </div>
      </div>
      <div class="nav">
        <div id="navCommon" class="nav-block">
          <h2>常用网址</h2>
          <ul class="fn-clear">
            <li>
              <a href="https://www.ifeng.com/" class="site-link" target="_blank" rel="nofollow">
                <span class="img-container">
                  <img src="https://img.hinpc.com/img/picgo/fenghuang.svg" alt="凤凰网" class="site-icon">
                </span>
                <span class="site-name">凤凰网</span>
                <i class="del"></i>
              </a>
            </li>
            <li>
              <a href="https://weibo.com" class="site-link" target="_blank" rel="nofollow">
                <span class="img-container">
                  <img src="https://img.hinpc.com/img/picgo/20191218202036_weibo.png" alt="微博" class="site-icon">
                </span>
                <span class="site-name">微博</span>
                <i class="del"></i>
              </a>
            </li>
            <li>
              <a href="https://iqiyi.com" class="site-link" target="_blank" rel="nofollow">
                <span class="img-container">
                  <img src="https://img.hinpc.com/img/picgo/20191218202234_iqiyi.svg" alt="爱奇艺" class="site-icon">
                </span>
                <span class="site-name">爱奇艺</span>
                <i class="del"></i>
              </a>
            </li>
            <li>
              <a href="https://music.163.com" class="site-link" target="_blank" rel="nofollow">
                <span class="img-container">
                  <img src="https://img.hinpc.com/img/picgo/20191218202305_netease_music.svg" style="width: 90%;"
                    alt="网易云音乐" class="site-icon">
                </span>
                <span class="site-name">网易云音乐</span>
                <i class="del"></i>
              </a>
            </li>
            <li>
              <a href="https://www.douban.com" class="site-link" target="_blank" rel="nofollow">
                <span class="img-container">
                  <img src="https://img.hinpc.com/img/picgo/20191218202633_douban.svg" alt="豆瓣网" class="site-icon">
                </span>
                <span class="site-name">豆瓣网</span>
                <i class="del"></i>
              </a>
            </li>
            <li>
              <a href="https://outlook.live.com" class="site-link" target="_blank" rel="nofollow">
                <span class="img-container">
                  <img src="https://img.hinpc.com/img/picgo/20191218202943_outlook.svg" alt="outlook" class="site-icon">
                </span>
                <span class="site-name">Outlook</span>
                <i class="del"></i>
              </a>
            </li>
            <li>
              <a href="https://pan.baidu.com" class="site-link" target="_blank" rel="nofollow">
                <span class="img-container">
                  <img src="<%= require('./src/asserts/svg/wangpan.svg').default%>" alt="百度网盘" class="site-icon">
                </span>
                <span class="site-name">百度网盘</span>
                <i class="del"></i>
              </a>
            </li>

            <!--
            <li>
              <a href="javascript:;" class="j-add-site site-link" rel="nofollow">
                <span class="img-container">
                  <img src="<%= require('./src/asserts/svg/add.svg').default%>" style="width: 90%;" class="site-icon">
                </span>
                <span class="site-name">添加</span>
              </a>
            </li>
            -->
          </ul>
        </div>
      </div>
    </div>
  </div>

  <div class="side">
    <h1 class="logo">
      <%= htmlWebpackPlugin.options.title %>
    </h1>
    <ul class="category top-divider">
      <!-- <li><a href="#navCommon">常用网址</a></li> -->

      <li><a href="javascript:;" class="custom j-advance-config">高级配置</a></li>
    </ul>
    <div class="footer top-divider">
      &copy; 2019 海风导航
      <a href="https://github.com/GallenHu/Teemo" class="github" target="_blank">Github</a>
    </div>
  </div>

  <script src="https://cdn.staticfile.org/jquery/1.9.1/jquery.min.js"></script>
  <script src="https://cdn.staticfile.org/artDialog/7.0.0/dialog.js"></script>
  <script>
    var _hmt = _hmt || [];
    (function () {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?9cba20eff7a96ae22881bff7e0039ec1";
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
  </script>
</body>

</html>
